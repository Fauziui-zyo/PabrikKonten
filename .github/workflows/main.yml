name: Ghost Factory Pipeline

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  produce-reel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Tools
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          pip install requests duckduckgo_search edge-tts

      - name: Run Ghost Factory
        run: python ghost_factory.py

      - name: FFmpeg Mashup & Anti-Detection
        run: |
          # Ambil durasi audio otomatis
          DUR=$(ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 audio.mp3)
          
          # Render dengan Film Grain & Metadata Scrubbing
          ffmpeg -y -loop 1 -i input_bg.jpg -i audio.mp3 \
          -vf "scale=1080:1920:force_original_aspect_ratio=increase,crop=1080:1920,noise=alls=15:allf=t+u" \
          -c:v libx264 -t $DUR -pix_fmt yuv420p -crf 23 -preset veryfast \
          -c:a aac -b:a 128k -map_metadata -1 -movflags +faststart \
          final_reel_makassar.mp4

      - name: 💾 Upload Hasil Produksi
        uses: actions/upload-artifact@v4
        with:
          name: medical-reel-${{ github.run_id }}
          path: final_reel_makassar.mp4
