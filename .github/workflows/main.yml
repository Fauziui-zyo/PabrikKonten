name: Health Reels Automation

on:
  schedule:
    # Berjalan otomatis setiap hari pada 00:00 UTC (08:00 WITA)
    - cron: '0 0 * * *'
  workflow_dispatch: 
    # Mengizinkan eksekusi manual via tombol di GitHub UI

jobs:
  automation-pipeline:
    name: 🚀 Generate & Render Pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 10 # Cukup 10 menit untuk menghemat kuota

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: '**/requirements.txt' # Advanced caching dari Qwen

      - name: 📊 System Resources Check
        run: |
          echo "Memeriksa kapasitas server GitHub..."
          df -h
          free -h

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install modal

      - name: 🧠 Step 1 - Generate Health Content (dengan Retry)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Smart Retry dari Qwen (Mencoba maksimal 3x jika API sibuk)
          for i in {1..3}; do
            if python bot_logic.py; then
              echo "✅ Otak AI sukses berjalan pada percobaan ke-$i"
              break
            else
              echo "⚠️ Percobaan ke-$i gagal, menunggu API stabil..."
              sleep $((2**i))
            fi
            if [ $i -eq 3 ]; then
              echo "❌ Gagal total setelah 3 percobaan."
              exit 1
            fi
          done

      - name: 🎬 Step 2 - Kirim Bahan ke Modal.com untuk Dirender
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
        run: |
          # Langsung mengeksekusi di Modal (tanpa deploy yang tidak perlu)
          modal run src/render_video.py

      - name: ✅ Step 3 - Verifikasi Hasil Akhir
        run: |
          if [ -f "reels_siap_upload.mp4" ]; then
            echo "✅ Video sukses dibuat!"
            ls -lh reels_siap_upload.mp4
          else
            echo "❌ Gagal: File reels_siap_upload.mp4 tidak ditemukan."
            exit 1
          fi

      - name: 💾 Step 4 - Simpan Video untuk Didownload (Artifact)
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: daily-health-reel-${{ github.run_id }}
          path: reels_siap_upload.mp4
          retention-days: 2 # Dihapus dalam 2 hari agar storage GitHub tetap lega
