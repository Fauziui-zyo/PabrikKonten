name: Bot Otak (Fase 1)

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  pikirkan_konsep:
    runs-on: ubuntu-latest
    steps:
      - name: Ambil kode dari repo
        uses: actions/checkout@v4

      - name: Siapkan Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # PERUBAHANNYA ADA DI SINI BANG: 
      # Kita langsung instal 'requests' tanpa butuh requirements.txt
      - name: Instal modul pendukung
        run: pip install requests

      - name: Jalankan Otak Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main_fase1.py

      - name: Simpan state.json ke Repo
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update otak: state.json baru"
          file_pattern: 'state.json'
