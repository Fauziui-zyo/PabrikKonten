name: V-Ultimate Serverless Factory

on:
  schedule:
    - cron: '30 0 * * *' # Jam 07.30 WITA
  workflow_dispatch:

jobs:
  bangun_pabrik:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instal Remote Remote Control (Modal)
        run: pip install modal

      - name: Eksekusi Reaktor GPU
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
          # Rahasia lain dikirim sebagai Environment Variable ke mesin GPU
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
        run: |
          modal run pabrik_konten.py
