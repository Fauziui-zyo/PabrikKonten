name: Pabrik Konten Lengkap (Fase 1, 2, 3)

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  produksi_aset_lengkap:
    runs-on: ubuntu-latest
    steps:
      - name: Ambil kode dari repo
        uses: actions/checkout@v4

      - name: Siapkan Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instal modul pendukung
        run: pip install google-generativeai requests

      - name: Fase 1 - Jalankan Otak Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main_fase1.py

      - name: Fase 2 - Jalankan Pelukis AI
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python main_fase2.py

      - name: Fase 3 - Rakit Metadata CSV
        run: python main_fase3_csv.py

      - name: Simpan Seluruh Hasil ke Repo
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update: Memproduksi JSON, JPG, dan CSV"
          file_pattern: 'state.json base_image.jpg metadata.csv'
