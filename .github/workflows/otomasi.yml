name: Bot Otak (Fase 1)

on:
  workflow_dispatch: # Pemicu Manual

env:
  # Mematuhi Blueprint Bab 2.2: Migrasi Lingkungan Node.js 24
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  pikirkan_konsep:
    runs-on: ubuntu-latest
    steps:
      - name: Ambil kode dari repo
        uses: actions/checkout@v4

      - name: Siapkan Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instal modul pendukung
        run: pip install -r requirements.txt

      - name: Jalankan Otak Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main_fase1.py

      - name: Simpan state.json ke Repo (Sementara untuk cek)
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update otak: state.json baru"
          file_pattern: 'state.json'
