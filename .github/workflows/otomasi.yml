name: Bot Konten Otomatis 24/7

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# INI KUNCI PENDOBRAKNYA: Memaksa izin tulis langsung dari dalam file
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Ambil kode dari repo
        uses: actions/checkout@v4

      - name: Siapkan Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instal aplikasi pendukung
        run: pip install -r requirements.txt

      - name: Jalankan Bot Pembuat Gambar
        run: python main.py

      # Langkah baru untuk mengecek isi folder (Debugging)
      - name: Cek keberadaan file gambar
        run: ls -la hasil_konten/ || echo "Folder tidak ditemukan!"

      - name: Simpan Hasil ke GitHub
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update konten otomatis [Bot]"
          file_pattern: 'hasil_konten/*.jpg'
