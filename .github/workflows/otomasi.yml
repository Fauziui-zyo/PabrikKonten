name: Pabrik Konten Final (Otomatis ZIP)

on:
  schedule:
    - cron: '0 0 * * *' # Otomatis jalan setiap jam 7 pagi WIB
  workflow_dispatch: # Bisa diklik manual kapan saja

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  produksi_aset:
    runs-on: ubuntu-latest
    steps:
      - name: Ambil kode dari repo
        uses: actions/checkout@v4

      - name: Siapkan Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instal modul pendukung
        run: pip install google-generativeai requests

      - name: Fase 1 - Otak Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main_fase1.py

      - name: Fase 2 - Pelukis AI
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python main_fase2.py

      - name: Fase 3 - Perakit Metadata
        run: python main_fase3_csv.py

      - name: Bungkus ke dalam ZIP
        run: zip hasil_panen.zip base_image.jpg metadata.csv state.json

      - name: Simpan Hasil Panen ke Repo
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Bot sukses memproduksi Aset Baru!"
          file_pattern: 'hasil_panen.zip'
